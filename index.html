<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado de Reparación — Ronni GSM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --surface2:#1a1a26;
  --surface3:#22223a;
  --border:#2a2a40;
  --border2:#3a3a58;
  --cyan:#00e5ff;
  --cyan2:#00b4cc;
  --cyan-dim:#004a55;
  --amber:#ffb300;
  --amber-dim:#3a2800;
  --green:#00e676;
  --green-dim:#003320;
  --red:#ff4444;
  --red-dim:#3a0000;
  --purple:#b388ff;
  --purple-dim:#2a1a4a;
  --blue:#00b4ff;
  --blue-dim:#001a3a;
  --text:#e8e8f0;
  --text2:#8888aa;
  --text3:#4a4a6a;
  --font:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:15px;
  line-height:1.5;
}

/* ── BG glow ── */
body::before{
  content:'';
  position:fixed;
  top:-120px;left:50%;
  transform:translateX(-50%);
  width:600px;height:300px;
  background:radial-gradient(ellipse,rgba(0,229,255,.07) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}

.page{
  max-width:480px;
  margin:0 auto;
  padding:24px 16px 48px;
  position:relative;
  z-index:1;
}

/* ── HEADER ── */
.logo-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:32px;
}
.logo{
  font-family:var(--mono);
  font-size:16px;
  font-weight:700;
  color:var(--cyan);
  letter-spacing:-.5px;
}
.logo span{color:var(--text2);font-weight:400}
.live-dot{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:var(--text2);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:4px 10px;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CARD PRINCIPAL ── */
.main-card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.card-top{
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  padding:24px 24px 20px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.card-top-label{
  font-size:10px;
  font-weight:700;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:6px;
}
.ticket-id{
  font-family:var(--mono);
  font-size:22px;
  font-weight:700;
  color:var(--cyan);
  letter-spacing:.5px;
}
.client-name{
  font-size:20px;
  font-weight:700;
  margin-top:8px;
  color:var(--text);
}
.device-line{
  font-size:13px;
  color:var(--text2);
  margin-top:4px;
  display:flex;
  align-items:center;
  gap:6px;
}
.card-badge-pos{
  position:absolute;
  top:20px;right:20px;
}

/* ── STATUS BLOCK ── */
.status-block{
  padding:28px 24px;
  text-align:center;
}
.status-label-sm{
  font-size:10px;
  font-weight:700;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:12px;
}
.status-ring{
  width:120px;height:120px;
  border-radius:50%;
  border:3px solid var(--border2);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  margin:0 auto 20px;
  position:relative;
  transition:.4s;
}
.status-ring::after{
  content:'';
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:2px solid transparent;
  transition:.4s;
}
.status-icon{font-size:36px;line-height:1;margin-bottom:4px}
.status-text-sm{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}

/* estado colors */
.est-pendiente .status-ring{border-color:var(--amber);box-shadow:0 0 20px rgba(255,179,0,.2)}
.est-pendiente .status-ring::after{border-color:rgba(255,179,0,.12)}
.est-proceso .status-ring{border-color:var(--blue);box-shadow:0 0 20px rgba(0,180,255,.2)}
.est-proceso .status-ring::after{border-color:rgba(0,180,255,.12)}
.est-listo .status-ring{border-color:var(--green);box-shadow:0 0 28px rgba(0,230,118,.3)}
.est-listo .status-ring::after{border-color:rgba(0,230,118,.15)}
.est-entregado .status-ring{border-color:var(--text3)}
.est-garantia .status-ring{border-color:var(--purple);box-shadow:0 0 20px rgba(179,136,255,.2)}
.est-cancelado .status-ring{border-color:var(--red);box-shadow:0 0 20px rgba(255,68,68,.15)}

.status-big{
  font-size:26px;
  font-weight:700;
  margin-bottom:6px;
  transition:.3s;
}
.est-pendiente .status-big{color:var(--amber)}
.est-proceso   .status-big{color:var(--blue)}
.est-listo     .status-big{color:var(--green)}
.est-entregado .status-big{color:var(--text2)}
.est-garantia  .status-big{color:var(--purple)}
.est-cancelado .status-big{color:var(--red)}

.status-desc{
  font-size:13px;
  color:var(--text2);
  max-width:260px;
  margin:0 auto;
}

/* ── PROGRESS STEPS ── */
.steps-wrap{
  padding:0 24px 24px;
  display:flex;
  flex-direction:column;
  gap:0;
}
.step{
  display:flex;
  align-items:flex-start;
  gap:14px;
  padding:10px 0;
  position:relative;
}
.step:not(:last-child)::after{
  content:'';
  position:absolute;
  left:16px;top:36px;
  width:2px;
  height:calc(100% - 6px);
  background:var(--border);
}
.step.done::after{background:var(--cyan-dim)}
.step-dot{
  width:32px;height:32px;
  border-radius:50%;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  flex-shrink:0;
  background:var(--surface2);
  transition:.3s;
  z-index:1;
}
.step.done .step-dot{
  border-color:var(--cyan);
  background:var(--cyan-dim);
}
.step.active .step-dot{
  border-color:var(--amber);
  background:var(--amber-dim);
  box-shadow:0 0 10px rgba(255,179,0,.3);
  animation:ringpulse 1.8s infinite;
}
.step.active.est-listo .step-dot{
  border-color:var(--green);
  background:var(--green-dim);
  box-shadow:0 0 14px rgba(0,230,118,.4);
  animation:none;
}
.step.active.est-proceso .step-dot{
  border-color:var(--blue);
  background:var(--blue-dim);
  box-shadow:0 0 10px rgba(0,180,255,.3);
}
@keyframes ringpulse{0%,100%{box-shadow:0 0 10px rgba(255,179,0,.3)}50%{box-shadow:0 0 18px rgba(255,179,0,.6)}}

.step-info{padding-top:4px;flex:1}
.step-name{font-size:13px;font-weight:600;color:var(--text)}
.step.done .step-name{color:var(--text2)}
.step.active .step-name{color:var(--text)}
.step-sub{font-size:11px;color:var(--text3);margin-top:1px}
.step.active .step-sub{color:var(--text2)}

/* ── INFO ROWS ── */
.info-rows{
  border-top:1px solid var(--border);
  padding:18px 24px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.info-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
}
.info-row-label{color:var(--text2);font-size:12px}
.info-row-val{font-weight:600;color:var(--text)}
.mono{font-family:var(--mono);font-size:12px}

/* ── FOOTER CARD ── */
.card-footer{
  background:var(--surface2);
  border-top:1px solid var(--border);
  padding:14px 24px;
  font-size:11px;
  color:var(--text3);
  text-align:center;
}

/* ── REFRESH BTN ── */
.refresh-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:20px;
  padding:12px 28px;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:12px;
  color:var(--text2);
  font-family:var(--font);
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  width:100%;
  transition:.2s;
}
.refresh-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--cyan)}
.refresh-icon{font-size:16px;transition:.3s}
.refresh-btn:active .refresh-icon{transform:rotate(180deg)}

/* ── STATES ── */
.state-loading,.state-error,.state-empty{
  text-align:center;
  padding:48px 20px;
}
.spin{
  display:inline-block;
  width:44px;height:44px;
  border:3px solid var(--border2);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-icon{font-size:40px;margin-bottom:12px}
.state-title{font-size:16px;font-weight:700;margin-bottom:6px}
.state-sub{font-size:13px;color:var(--text2)}

/* ── LAST UPDATE ── */
.last-update{
  font-size:11px;
  color:var(--text3);
  text-align:center;
  margin-top:14px;
}

/* ── BADGE ── */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:700;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge.pendiente{color:var(--amber);background:var(--amber-dim)}
.badge.proceso{color:var(--blue);background:var(--blue-dim)}
.badge.listo{color:var(--green);background:var(--green-dim)}
.badge.entregado{color:var(--text2);background:var(--surface3)}
.badge.cancelado{color:var(--red);background:var(--red-dim)}
.badge.garantia{color:var(--purple);background:var(--purple-dim)}

/* ── RESPONSIVE ── */
@media(max-width:400px){
  .page{padding:16px 12px 40px}
  .card-top{padding:18px 16px 16px}
  .status-block{padding:20px 16px}
  .steps-wrap{padding:0 16px 18px}
  .info-rows{padding:14px 16px}
  .card-footer{padding:12px 16px}
  .status-ring{width:100px;height:100px}
  .status-icon{font-size:28px}
  .status-big{font-size:22px}
  .client-name{font-size:17px}
  .ticket-id{font-size:18px}
}
</style>
</head>
<body>
<div class="page">

  <!-- LOGO BAR -->
  <div class="logo-bar">
    <div class="logo">RONNI<span>·</span>GSM</div>
    <div class="live-dot"><div class="dot"></div>En vivo</div>
  </div>

  <!-- CONTENT (dinamico) -->
  <div id="content">
    <div class="state-loading main-card" style="padding:60px 20px">
      <div class="spin"></div>
      <div class="state-title" style="color:var(--cyan)">Consultando estado...</div>
      <div class="state-sub">Conectando con el sistema</div>
    </div>
  </div>

  <!-- REFRESH -->
  <button class="refresh-btn" onclick="cargarEstado()">
    <span class="refresh-icon">↻</span> Actualizar estado
  </button>
  <div class="last-update" id="last-update"></div>

</div>

<script>
// ── CONFIG ──
// IMPORTANTE: Cambia esta URL a tu backend en Render
const API_URL = 'https://ronni-gsm-backend.onrender.com';

// ── ESTADO DATA ──
const ESTADOS = {
  'Pendiente': {
    class:'est-pendiente', icon:'⏳', label:'Pendiente',
    desc:'Tu equipo está registrado y en cola de atención.',
    steps:['done','active','','',''],
    badgeClass:'pendiente'
  },
  'En proceso': {
    class:'est-proceso', icon:'🔧', label:'En reparación',
    desc:'Un técnico está trabajando en tu equipo ahora mismo.',
    steps:['done','done','active','',''],
    badgeClass:'proceso'
  },
  'Listo': {
    class:'est-listo', icon:'✅', label:'¡Listo para recoger!',
    desc:'Tu equipo está reparado y te espera en el taller. ¡Puedes venir a recogerlo!',
    steps:['done','done','done','active',''],
    badgeClass:'listo'
  },
  'Entregado': {
    class:'est-entregado', icon:'📦', label:'Entregado',
    desc:'El equipo fue devuelto al cliente. ¡Gracias por confiar en Ronni GSM!',
    steps:['done','done','done','done','done'],
    badgeClass:'entregado'
  },
  'Garantía': {
    class:'est-garantia', icon:'🛡️', label:'En garantía',
    desc:'Tu equipo está bajo garantía y siendo revisado por nuestro equipo.',
    steps:['done','done','done','done','active'],
    badgeClass:'garantia'
  },
  'Cancelado': {
    class:'est-cancelado', icon:'✕', label:'Cancelado',
    desc:'El servicio fue cancelado. Contáctanos si tienes alguna consulta.',
    steps:['done','','','',''],
    badgeClass:'cancelado'
  }
};

const STEPS_DEF = [
  {icon:'📋', name:'Ingresado',     sub:'Equipo recibido en el taller'},
  {icon:'🔍', name:'Diagnóstico',   sub:'Evaluando la falla'},
  {icon:'🔧', name:'En reparación', sub:'Técnico trabajando'},
  {icon:'✅', name:'Listo',         sub:'Reparación completada'},
  {icon:'📦', name:'Entregado',     sub:'Equipo devuelto al cliente'}
];

function getIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || '';
}

function estadoClass(e) {
  return {Pendiente:'pendiente','En proceso':'proceso',Listo:'listo',Entregado:'entregado','Garantía':'garantia',Cancelado:'cancelado'}[e] || 'pendiente';
}

function renderCard(c) {
  const est = c.estado || 'Pendiente';
  const cfg = ESTADOS[est] || ESTADOS['Pendiente'];
  const stepClass = est === 'En proceso' ? 'est-proceso' : est === 'Listo' ? 'est-listo' : '';

  const stepsHTML = STEPS_DEF.map((s, i) => {
    const st = cfg.steps[i];
    const cls = st === 'done' ? 'done' : st === 'active' ? 'active '+stepClass : '';
    return `<div class="step ${cls}">
      <div class="step-dot">${st === 'done' ? '✓' : s.icon}</div>
      <div class="step-info">
        <div class="step-name">${s.name}</div>
        <div class="step-sub">${s.sub}</div>
      </div>
    </div>`;
  }).join('');

  const html = `
  <div class="main-card ${cfg.class}">
    <div class="card-top">
      <div class="card-top-label">Ficha de servicio</div>
      <div class="ticket-id">${c.id}</div>
      <div class="client-name">${c.nombre || '—'}</div>
      <div class="device-line">
        <span>📱</span>
        <span>${[c.equipo, c.modelo].filter(Boolean).join(' ') || 'Sin especificar'}</span>
      </div>
      <div class="card-badge-pos">
        <span class="badge ${cfg.badgeClass}">${est}</span>
      </div>
    </div>

    <div class="status-block">
      <div class="status-label-sm">Estado actual</div>
      <div class="status-ring">
        <div class="status-icon">${cfg.icon}</div>
        <div class="status-text-sm">${est}</div>
      </div>
      <div class="status-big">${cfg.label}</div>
      <div class="status-desc">${cfg.desc}</div>
    </div>

    <div class="steps-wrap">${stepsHTML}</div>

    <div class="info-rows">
      ${c.servicio ? `<div class="info-row"><span class="info-row-label">Servicio</span><span class="info-row-val">${c.servicio}</span></div>` : ''}
      ${c.tecnico  ? `<div class="info-row"><span class="info-row-label">Técnico</span><span class="info-row-val">${c.tecnico}</span></div>` : ''}
      ${c.fecha    ? `<div class="info-row"><span class="info-row-label">Fecha ingreso</span><span class="info-row-val mono">${c.fecha}</span></div>` : ''}
      ${c.precio && parseFloat(c.precio) > 0 ? `<div class="info-row"><span class="info-row-label">Presupuesto</span><span class="info-row-val" style="color:var(--green)">S/ ${parseFloat(c.precio).toFixed(2)}</span></div>` : ''}
    </div>

    <div class="card-footer">
      🔧 Ronni GSM &nbsp;·&nbsp; Actualizamos tu estado en tiempo real
    </div>
  </div>`;

  document.getElementById('content').innerHTML = html;
  updateTimestamp();
}

function renderError(msg) {
  document.getElementById('content').innerHTML = `
  <div class="main-card">
    <div class="state-error" style="padding:60px 24px">
      <div class="error-icon">⚠️</div>
      <div class="state-title">No encontrado</div>
      <div class="state-sub">${msg}</div>
    </div>
  </div>`;
}

function renderLoading() {
  document.getElementById('content').innerHTML = `
  <div class="main-card">
    <div class="state-loading" style="padding:60px 20px">
      <div class="spin"></div>
      <div class="state-title" style="color:var(--cyan)">Consultando estado...</div>
      <div class="state-sub">Conectando con el sistema</div>
    </div>
  </div>`;
}

function updateTimestamp() {
  const el = document.getElementById('last-update');
  if (el) el.textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

async function cargarEstado() {
  const id = getIdFromURL();
  if (!id) {
    renderError('No se especificó un número de ficha.<br><span style="font-size:12px;color:var(--text3)">Usa el link que te proporcionó el taller.</span>');
    return;
  }

  renderLoading();

  try {
    const res = await fetch(API_URL + '/clientes/' + encodeURIComponent(id), {
      headers: {'Accept': 'application/json'},
      signal: AbortSignal.timeout(12000)
    });

    if (res.status === 404) {
      renderError('Ficha <strong style="color:var(--cyan)">' + id + '</strong> no encontrada.<br><span style="font-size:12px;color:var(--text3)">Verifica el código o consulta en el taller.</span>');
      return;
    }
    if (!res.ok) throw new Error('Error ' + res.status);

    const data = await res.json();
    renderCard(data);

    // Auto-refresh cada 30s
    setTimeout(cargarEstado, 30000);

  } catch (e) {
    const esTimeout = e.name === 'TimeoutError' || e.name === 'AbortError';
    renderError(
      esTimeout
        ? 'El servidor tardó demasiado en responder.<br><span style="font-size:12px;color:var(--text3)">Puede estar iniciando (máx. 30 seg). Reintentando...</span>'
        : 'No se pudo conectar con el sistema.<br><span style="font-size:12px;color:var(--text3)">' + e.message + '</span>'
    );
    // Retry en 15s si hay error de red
    setTimeout(cargarEstado, 15000);
  }
}

// Init
cargarEstado();
</script>
</body>
</html>
